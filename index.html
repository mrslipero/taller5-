<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Facebook</title>

<link rel="stylesheet" href="estilos.css">

<link href="https://fonts.googleapis.com/css2?family=Profusely+Yours&display=swap" rel="stylesheet">

</head>

<body>

<header class="box-titulo">

<div class="left">
<img src="facebook.png" class="logo">
<input type="text" placeholder="🔍 Buscar en Facebook" class="lupa">
</div>

<div class="center">

<button class="boton">
<img src="logoc-Photoroom.png" class="img-home">
</button>

<button class="boton">
<img src="logo1.png" class="img-video">
</button>

<button class="boton">
<img src="marketplace.png" class="market">
</button>

<button class="boton">
<img src="grupo-Photoroom.png" class="grupo">
</button>

<button class="boton">
<img src="juego.png" class="juego">
</button>

</div>

</header>


<div class="contenedor">

<aside class="barra">

<div class="perfil">
<img src="gato.jpeg">
<span>Martinez Sebastian</span>
</div>

<div class="menu-item">
<img src="bus.png">
<span>Meta AI</span>
</div>

<div class="menu-item">
<img src="amigos.png">
<span>Amigos</span>
</div>

<div class="menu-item">
<img src="guardar.png">
<span>Guardado</span>
</div>

<div class="menu-item">
<img src="recuerdos.png">
<span>Recuerdos</span>
</div>

<div class="menu-item">
<img src="grupos.png">
<span>Grupos</span>
</div>

<div class="menu-item">
<img src="rells.png">
<span>Reels</span>
</div>

<div class="menu-item">
<img src="market1.png">
<span>Marketplace</span>
</div>

</aside>


<main class="main">

<div class="post-box">

<img src="gato.jpeg" class="post-avatar">

<input type="text"
placeholder="¿Qué estás pensando, Sebastian?"
class="post-input">

<div class="post-icons">
<span>📹</span>
<span>🖼️</span>
<span>😊</span>
</div>

</div>


<div class="stories">

<div class="story create-story">
<img src="moto.jpg">
<div class="create-btn">+</div>
<p>Crear historia</p>
</div>

<div class="story">
<img src="persona1.jpg">
<div class="story-profile"></div>
<p>Danaa Hernandez</p>
</div>

<div class="story">
<img src="persona2.jpg">
<div class="story-profile"></div>
<p>Daniela Caballero</p>
</div>

<div class="story">
<img src="persona3.jpg">
<div class="story-profile"></div>
<p>Andrea Latorre</p>
</div>

<div class="story">
<img src="persona4.jpg">
<div class="story-profile"></div>
<p>Alejandra Jimenez</p>
</div>

</div>

</main>

</div>

</body>
</html>
